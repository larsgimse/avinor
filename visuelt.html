<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Flyradar Norge</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #111; }
        #map { height: 100vh; width: 100vw; }
        
        .ui-panel {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 10px 20px; 
            border-radius: 30px; font-family: sans-serif; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="ui-panel" onclick="toggleTheme()">Tema: <span id="label">Lyst</span></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([64.5, 15.0], 5);
        const light = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        
        // Canvas som ligger stabilt over kartet
        const canvas = L.DomUtil.create('canvas', 'leaflet-layer');
        map.getPanes().overlayPane.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        
        let isDark = false;
        let allFlights = {};

        function toggleTheme() {
            isDark = !isDark;
            document.getElementById('label').innerText = isDark ? "Mørkt" : "Lyst";
            if (isDark) { map.removeLayer(light); dark.addTo(map); }
            else { map.removeLayer(dark); light.addTo(map); }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }

        async function fetchFlights() {
            const b = map.getBounds();
            const url = `https://corsproxy.io/?https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=${b.getNorth().toFixed(1)},${b.getSouth().toFixed(1)},${b.getWest().toFixed(1)},${b.getEast().toFixed(1)}%26faa=1%26air=1&_=${Date.now()}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                for (let id in data) {
                    if (id !== "full_count" && id !== "version" && id !== "stats") {
                        allFlights[id] = { lat: data[id][1], lon: data[id][2] };
                    }
                }
            } catch(e) {}
        }

        function draw() {
            // Fade-effekt (halen)
            ctx.fillStyle = isDark ? "rgba(17,17,17,0.15)" : "rgba(248,249,250,0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Tegn hale (Oransje glød)
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff9800";
            ctx.fillStyle = "#ff9800";

            for (let id in allFlights) {
                const point = map.latLngToContainerPoint([allFlights[id].lat, allFlights[id].lon]);
                
                // Halen
                ctx.beginPath();
                ctx.arc(point.x, point.y, 2, 0, Math.PI * 2);
                ctx.fill();

                // Prikken (Skarp hvit/svart, ingen glød her)
                ctx.shadowBlur = 0;
                ctx.fillStyle = isDark ? "#ffffff" : "#000000";
                ctx.beginPath();
                ctx.arc(point.x, point.y, 1.5, 0, Math.PI * 2);
                ctx.fill();

                // Sett tilbake for neste fly
                ctx.shadowBlur = 15;
                ctx.fillStyle = "#ff9800";
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        map.on('move', resize);
        map.on('moveend', fetchFlights);
        
        resize();
        fetchFlights();
        draw();
    </script>
</body>
</html>
