<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Live Flyradar Norge</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #f8f9fa; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([64.5, 15.0], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        const canvas = L.DomUtil.create('canvas', 'leaflet-layer');
        map.getPanes().overlayPane.appendChild(canvas);
        const ctx = canvas.getContext('2d');

        let allFlights = {};

        function updateCanvasSize() {
            const size = map.getSize();
            canvas.style.position = 'absolute';
            canvas.style.left = '0px';
            canvas.style.top = '0px';
            canvas.width = size.x;
            canvas.height = size.y;
        }

        async function loadDataForView() {
            // Hent synlige koordinater fra kartet
            const b = map.getBounds();
            // Format: North, South, West, East
            const boundsStr = `${b.getNorth().toFixed(1)},${b.getSouth().toFixed(1)},${b.getWest().toFixed(1)},${b.getEast().toFixed(1)}`;
            
            const url = `https://corsproxy.io/?https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=${boundsStr}%26faa=1%26flight_states=1%26mlat=1%26air=1&_=${Date.now()}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                for (let id in data) {
                    if (id !== "full_count" && id !== "version" && id !== "stats") {
                        allFlights[id] = { lat: data[id][1], lon: data[id][2] };
                    }
                }
            } catch(e) { console.error("Henting feilet", e); }
        }

        function draw() {
            // Fade-effekt
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#000000";
            for (let id in allFlights) {
                const point = map.latLngToContainerPoint([allFlights[id].lat, allFlights[id].lon]);
                ctx.beginPath();
                ctx.arc(point.x, point.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        map.on('moveend', loadDataForView); // Hent nye fly hver gang vi flytter kartet
        map.on('zoomend', loadDataForView); // Hent nye fly hver gang vi zoomer
        map.on('move', updateCanvasSize);
        
        updateCanvasSize();
        loadDataForView();
        setInterval(loadDataForView, 30000); // Oppdater hvert 30. sek
        draw();
    </script>
</body>
</html>
