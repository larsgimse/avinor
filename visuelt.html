<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Flyradar Norge</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; transition: background 0.3s; }
        #map { height: 100vh; width: 100vw; }
        
        /* Bryter-design */
        #theme-toggle {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 8px 12px;
            border-radius: 20px; font-family: sans-serif; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div id="theme-toggle" onclick="toggleTheme()">Skift tema</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let isDark = false;
        const map = L.map('map', { zoomControl: false }).setView([64.5, 15.0], 5);
        
        // Definer lagene
        const lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
        const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        lightLayer.addTo(map);

        const canvas = L.DomUtil.create('canvas', 'leaflet-layer');
        map.getPanes().overlayPane.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        
        let allFlights = {};

        function toggleTheme() {
            isDark = !isDark;
            // Bytt kart
            map.removeLayer(isDark ? lightLayer : darkLayer);
            (isDark ? darkLayer : lightLayer).addTo(map);
            
            // Endre bakgrunn for body
            document.body.style.backgroundColor = isDark ? "#111" : "#f8f9fa";
        }

        function updateCanvasSize() {
            canvas.width = map.getSize().x;
            canvas.height = map.getSize().y;
        }

        async function loadData() {
            const b = map.getBounds();
            const url = `https://corsproxy.io/?https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=${b.getNorth().toFixed(1)},${b.getSouth().toFixed(1)},${b.getWest().toFixed(1)},${b.getEast().toFixed(1)}%26faa=1%26air=1&_=${Date.now()}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                for (let id in data) {
                    if (id !== "full_count" && id !== "version" && id !== "stats") {
                        allFlights[id] = { lat: data[id][1], lon: data[id][2] };
                    }
                }
            } catch(e) {}
        }

        function draw() {
            // Fade-farge avhenger av tema
            ctx.fillStyle = isDark ? "rgba(17, 17, 17, 0.15)" : "rgba(248, 249, 250, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = isDark ? "#ffffff" : "#000000";
            for (let id in allFlights) {
                const point = map.latLngToContainerPoint([allFlights[id].lat, allFlights[id].lon]);
                ctx.beginPath();
                ctx.arc(point.x, point.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        map.on('move', updateCanvasSize);
        map.on('moveend', loadData);
        updateCanvasSize();
        loadData();
        draw();
    </script>
</body>
</html>
