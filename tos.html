<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tromsø Lufthavn - Live Board</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--card-bg);
            padding-bottom: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 { margin: 0; font-size: 28px; }
        h1 span { color: var(--accent); }

        .btn-group {
            display: flex;
            gap: 10px;
            background: #111827;
            padding: 4px;
            border-radius: 8px;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 8px 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: var(--accent);
            color: var(--bg-color);
        }

        .status-indicator {
            font-size: 14px;
            color: var(--text-muted);
            background: var(--card-bg);
            padding: 6px 12px;
            border-radius: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
        }

        th, td { padding: 16px; text-align: left; }

        th {
            background-color: #111827;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        tr { border-bottom: 1px solid #334155; }
        tr:last-child { border-bottom: none; }
        
        tr.history {
            opacity: 0.55;
            background-color: #131c2e;
        }
        
        tr:hover td { background-color: #253348; }

        .time { font-weight: 700; color: #ffffff; font-size: 16px; }
        
        .flight-id {
            font-family: monospace;
            background: #0f172a;
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--text-main);
        }

        .gate {
            font-weight: bold;
            color: var(--accent);
            background: #111827;
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        .status-ok { color: var(--success); font-weight: 500; }
        .status-delay { color: var(--danger); font-weight: 600; }
        .status-past { color: var(--text-muted); font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Tromsø Lufthavn <span id="board-tittel">• Avganger</span></h1>
        <div class="btn-group">
            <button id="btn-D" class="tab-btn active" onclick="byttRetning('D')">Avganger</button>
            <button id="btn-A" class="tab-btn" onclick="byttRetning('A')">Ankomster</button>
        </div>
        <div id="status" class="status-indicator">Klargjør data...</div>
    </header>

    <table>
        <thead>
            <tr>
                <th>Tid</th>
                <th>Flynummer</th>
                <th>Selskap</th>
                <th id="sted-kolonne">Destinasjon</th>
                <th>Gate</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tabell-body">
            </tbody>
    </table>
</div>

<script>
    let gjeldendeRetning = 'D';
    let lagretXmlDoc = null;

    function byttRetning(retning) {
        gjeldendeRetning = retning;
        
        document.getElementById('btn-D').classList.toggle('active', retning === 'D');
        document.getElementById('btn-A').classList.toggle('active', retning === 'A');
        document.getElementById('board-tittel').innerText = retning === 'D' ? '• Avganger' : '• Ankomster';
        document.getElementById('sted-kolonne').innerText = retning === 'D' ? 'Destinasjon' : 'Kommer fra';
        
        if (lagretXmlDoc) visData();
    }

    function formaterLokalTid(isoStreng) {
        if (!isoStreng) return "--:--";
        const dato = new Date(isoStreng);
        return dato.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
    }

    async function lastFlydata() {
        const statusTekst = document.getElementById('status');
        
        try {
            const response = await fetch('flydata.xml?cachebuster=' + new Date().getTime());
            
            if (!response.ok) {
                throw new Error("Flydata klargjøres av GitHub...");
            }
            
            const xmlTekst = await response.text();
            const parser = new DOMParser();
            lagretXmlDoc = parser.parseFromString(xmlTekst, "application/xml");
            
            visData();
            statusTekst.innerText = "Sist synkronisert: " + new Date().toLocaleTimeString('no-NO', {hour: '2-digit', minute:'2-digit'});

        } catch (feil) {
            statusTekst.innerText = feil.message;
        }
    }

    function visData() {
        const flightsNodes = lagretXmlDoc.getElementsByTagName("flight");
        const nuhue = new Date();
        let html = "";
        
        let flightsArray = Array.from(flightsNodes);
        
        // Sorterer listen kronologisk basert på oppgitt rutetid
        flightsArray.sort((a, b) => {
            const tidA = new Date(a.getElementsByTagName("schedule_time")[0]?.textContent || 0);
            const tidB = new Date(b.getElementsByTagName("schedule_time")[0]?.textContent || 0);
            return tidA - tidB;
        });

        let antallFly = 0;

        for (let flight of flightsArray) {
            if (flight.getElementsByTagName("arr_dep")[0]?.textContent !== gjeldendeRetning) continue;
            antallFly++;

            const tidRaw = flight.getElementsByTagName("schedule_time")[0]?.textContent;
            const flyDato = new Date(tidRaw);
            const tid = formaterLokalTid(tidRaw);
            
            const flynr = flight.getElementsByTagName("flight_id")[0]?.textContent || "-";
            const selskap = flight.getElementsByTagName("airline")[0]?.textContent || "-";
            const sted = flight.getElementsByTagName("airport")[0]?.textContent || "-";
            
            const gateNode = flight.getElementsByTagName("gate")[0]?.textContent;
            const gate = gateNode ? `<span class="gate">${gateNode}</span>` : "-";
            
            const statusNode = flight.getElementsByTagName("status")[0];
            let status = "I rute";
            let klasse = "status-ok";
            let radKlasse = "";

            // Sjekker om flytiden opprinnelig har passert nåtid
            if (flyDato < nuhue) {
                radKlasse = 'class="history"';
                status = gjeldendeRetning === 'D' ? "Nylig avreist" : "Nylig ankommet";
                klasse = "status-past";
            }
            
            if (statusNode) {
                const kode = statusNode.getAttribute("code");
                const statusTid = formaterLokalTid(statusNode.getAttribute("time"));

                if (kode === "E") {
                    status = "Ny tid: " + statusTid;
                    klasse = "status-delay";
                    // Hvis den nye tiden fortsatt er frem i tid, fjerner vi mørkleggingen av raden
                    if (new Date(statusNode.getAttribute("time")) > nuhue) {
                        radKlasse = "";
                    }
                } else if (kode === "C") {
                    status = "Innstilt";
                    klasse = "status-delay";
                } else if (kode === "D") {
                    status = "Gått " + statusTid;
                    klasse = "status-past";
                    radKlasse = 'class="history"';
                } else if (kode === "A") {
                    status = "Landet " + statusTid;
                    klasse = "status-past";
                    radKlasse = 'class="history"';
                }
            }

            html += `<tr>
                <td ${radKlasse}><span class="time">${tid}</span></td>
                <td ${radKlasse}><span class="flight-id">${flynr}</span></td>
                <td ${radKlasse}>${selskap}</td>
                <td ${radKlasse}><b>${sted}</b></td>
                <td ${radKlasse}>${gate}</td>
                <td class="${klasse}">${status}</td>
            </tr>`;
        }

        if (antallFly === 0) {
            html = `<tr><td colspan="6" style="text-align:center; color:var(--text-muted);">Ingen planlagte eller nylige flyvninger funnet.</td></tr>`;
        }

        document.getElementById('tabell-body').innerHTML = html;
    }

    lastFlydata();
    setInterval(lastFlydata, 60000);
</script>

</body>
</html>
