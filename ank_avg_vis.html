<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Tromsø Flyplass & Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: monospace; background: #fff; color: #000; padding: 5px; margin: 0; }
        .tab-menu { display: flex; width: 100%; border: 2px solid #000; margin-bottom: 10px; }
        .tab-btn { flex: 1; border: none; padding: 10px; font-weight: bold; cursor: pointer; background: #fff; font-family: monospace; }
        .tab-btn.active { background: #000; color: #fff; }
        .view { display: none; }
        .view.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th, td { border-bottom: 1px solid #000; text-align: left; padding: 5px; font-size: 0.8rem; }
        #map { height: 400px; width: 100%; border: 2px solid #000; margin-top: 5px; }
        .counter { font-size: 0.8rem; margin: 5px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="tab-menu">
        <button id="btn-rutetid" class="tab-btn active" onclick="byttFane('rutetid')">RUTETID</button>
        <button id="btn-kart" class="tab-btn" onclick="byttFane('kart')">RADAR-KART</button>
    </div>

    <div id="rutetid" class="view active">
        <button onclick="nullstillOgHent()" style="width:100%; padding:10px; border:2px solid #000; background:#fff; font-weight:bold;">OPPDATER RUTETIDER</button>
        <table id="tabellAvinor">
            <thead><tr><th>Tid</th><th>Fly</th><th>Sted</th><th>Status</th></tr></thead>
            <tbody id="dataAvinor"></tbody>
        </table>
    </div>

    <div id="kart" class="view">
        <div id="counter" class="counter">Fly synlige: 0</div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- Felles variabler ---
        var lagretXmlDoc = null;
        var radarListe = [];
        
        // --- Kart Logikk ---
        const map = L.map('map', { zoomControl: false }).setView([69.65, 18.95], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        const canvas = L.DomUtil.create('canvas', 'leaflet-zoom-animated');
        map.getPanes().overlayPane.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        let flights = {};

        function byttFane(fane) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(fane).classList.add('active');
            document.getElementById('btn-' + fane).classList.add('active');
            if(fane === 'kart') map.invalidateSize();
        }

        async function fetchRadar() {
            const b = map.getBounds();
            const url = `https://corsproxy.io/?https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=${b.getNorth().toFixed(1)},${b.getSouth().toFixed(1)},${b.getWest().toFixed(1)},${b.getEast().toFixed(1)}%26faa=1%26air=1&_=${Date.now()}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                radarListe = [];
                let count = 0;
                for (let id in data) {
                    if (id !== "full_count" && id !== "version" && id !== "stats") {
                        flights[id] = { lat: data[id][1], lon: data[id][2] };
                        radarListe.push({ rutenummer: (data[id][13] || "").replace(/\s+/g, '').toUpperCase() });
                        count++;
                    }
                }
                document.getElementById('counter').innerText = "Fly synlige: " + count;
            } catch(e) {}
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const tl = map.latLngToLayerPoint(map.getBounds().getNorthWest());
            ctx.fillStyle = "#000";
            for (let id in flights) {
                const p = map.latLngToLayerPoint([flights[id].lat, flights[id].lon]);
                ctx.beginPath(); ctx.arc(p.x - tl.x, p.y - tl.y, 4, 0, Math.PI * 2); ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        // --- Avinor Logikk ---
        function hentAvinorData() {
            fetch("flydata.xml?cachebuster=" + Date.now())
                .then(r => r.text())
                .then(txt => {
                    lagretXmlDoc = new DOMParser().parseFromString(txt, "application/xml");
                    visKombinertData();
                });
        }

        function visKombinertData() {
            var flightsXml = Array.from(lagretXmlDoc.getElementsByTagName("flight"));
            var html = "";
            flightsXml.forEach(f => {
                var tid = f.getElementsByTagName("schedule_time")[0].textContent.substring(11, 16);
                var flynr = f.getElementsByTagName("flight_id")[0].textContent;
                var sted = f.getElementsByTagName("airport")[0].textContent;
                html += "<tr><td>" + tid + "</td><td>" + flynr + "</td><td>" + sted + "</td><td>I rute</td></tr>";
            });
            document.getElementById("dataAvinor").innerHTML = html;
        }

        function nullstillOgHent() { hentAvinorData(); fetchRadar(); }

        // Initialisering
        map.on('moveend', fetchRadar);
        setInterval(nullstillOgHent, 60000);
        nullstillOgHent();
        draw();
    </script>
</body>
</html>
