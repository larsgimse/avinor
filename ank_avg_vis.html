<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tromsø Info</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; background-color: #ffffff; color: #000000; padding: 5px; margin: 0; }
        .tab-menu { display: flex; width: 100%; border: 2px solid #000; }
        .tab-btn { flex: 1; border: none; padding: 10px; font-weight: bold; cursor: pointer; background: #fff; }
        .tab-btn.active { background: #000; color: #fff; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #000; text-align: left; padding: 4px; font-size: 0.8rem; }
        #map { height: 60vh; width: 100%; border: 2px solid #000; margin-top: 10px; }
        .meta { font-size: 0.7rem; margin-top: 10px; border-top: 1px solid #000; }
    </style>
</head>
<body>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="visFane('rutetid')">RUTETIDER</button>
        <button class="tab-btn" onclick="visFane('kart')">KART</button>
    </div>

    <div id="rutetid" class="content-section active">
        <button onclick="nullstillOgHent()" style="width:100%; padding:10px; border:2px solid #000; background:#fff; font-weight:bold;">OPPDATER DATA</button>
        <table id="tabellAvinor">
            <thead><tr><th>Tid</th><th>Fly</th><th>Fra/Til</th><th>Status</th></tr></thead>
            <tbody id="dataAvinor"></tbody>
        </table>
    </div>

    <div id="kart" class="content-section">
        <div id="map"></div>
        <div id="counter" style="font-size:0.8rem; margin-top:5px;">Fly synlige: 0</div>
    </div>

    <div class="meta">Sist oppdatert: <span id="time">-</span></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- Kartlogikk ---
        const map = L.map('map', { zoomControl: false }).setView([69.65, 18.95], 9);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        const canvas = L.DomUtil.create('canvas', 'leaflet-zoom-animated');
        map.getPanes().overlayPane.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        let flights = {};

        function visFane(fane) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(fane).classList.add('active');
            event.target.classList.add('active');
            if(fane === 'kart') map.invalidateSize();
        }

        // --- Hent Data (Enkel versjon for e-ink ytelse) ---
        async function fetchFlights() {
            const b = map.getBounds();
            const url = `https://corsproxy.io/?https://data-cloud.flightradar24.com/zones/fcgi/feed.js?bounds=${b.getNorth().toFixed(1)},${b.getSouth().toFixed(1)},${b.getWest().toFixed(1)},${b.getEast().toFixed(1)}%26faa=1%26air=1`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                let count = 0;
                for (let id in data) {
                    if (id !== "full_count" && id !== "version" && id !== "stats") {
                        flights[id] = { lat: data[id][1], lon: data[id][2] };
                        count++;
                    }
                }
                document.getElementById('counter').innerText = "Fly synlige: " + count;
                document.getElementById('time').innerText = new Date().toLocaleTimeString();
            } catch(e) {}
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const tl = map.latLngToLayerPoint(map.getBounds().getNorthWest());
            ctx.fillStyle = "#000";
            for (let id in flights) {
                const p = map.latLngToLayerPoint([flights[id].lat, flights[id].lon]);
                ctx.beginPath(); ctx.arc(p.x - tl.x, p.y - tl.y, 3, 0, Math.PI * 2); ctx.fill();
            }
            requestAnimationFrame(draw);
        }

        map.on('move zoom', () => {
            const b = map.getBounds(), s = map.getSize(), tl = map.latLngToLayerPoint(b.getNorthWest());
            canvas.style.left = tl.x + 'px'; canvas.style.top = tl.y + 'px';
            canvas.width = s.x; canvas.height = s.y;
        });

        // Initialisering
        fetchFlights();
        setInterval(fetchFlights, 60000); // 1 min oppdatering for å spare batteri/e-ink-flimmer
        draw();
    </script>
</body>
</html>
